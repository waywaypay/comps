name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time; cancel in-flight runs if a newer push comes in.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  api:
    name: Deploy api
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy -c deploy/fly.api.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  worker:
    name: Deploy worker
    runs-on: ubuntu-latest
    needs: api  # api migrate-on-release happens first; worker assumes schema is current
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy -c deploy/fly.worker.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
